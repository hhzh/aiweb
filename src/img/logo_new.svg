<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景与外框 -->
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#e6f2ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="800" height="800" fill="#ffffff"/>

    <!-- 外圆背景 -->
    <circle cx="400" cy="300" r="260" fill="#e6f2ff" opacity="0.5"/>
    <circle cx="400" cy="300" r="260" fill="none" stroke="#0066dd" stroke-width="12"/>

    <!-- 装饰元素 -->
    <circle cx="250" cy="220" r="4" fill="#0066dd" opacity="0.7"/>
    <circle cx="300" cy="180" r="3" fill="#0088ff" opacity="0.7"/>
    <circle cx="500" cy="180" r="3" fill="#0088ff" opacity="0.7"/>
    <circle cx="550" cy="380" r="3" fill="#0088ff" opacity="0.7"/>
    <circle cx="250" cy="380" r="3" fill="#0088ff" opacity="0.7"/>
    <circle cx="280" cy="350" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="520" cy="350" r="2" fill="#ffffff" opacity="0.8"/>
    <path d="M 230 200 l 4 8 l 8 4 l -8 4 l -4 8 l -4 -8 l -8 -4 l 8 -4 z" fill="#0066dd" opacity="0.7"/>
    <path d="M 570 200 l 4 8 l 8 4 l -8 4 l -4 8 l -4 -8 l -8 -4 l 8 -4 z" fill="#0066dd" opacity="0.7"/>

    <!-- AI 气泡 -->
    <circle cx="230" cy="290" r="45" fill="#0066dd"/>
    <path d="M 230 335 l 15 25 l -15 10 l -15 -25 z" fill="#0066dd"/>
    <text x="230" y="300" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">AI</text>

    <!-- 代码框 -->
    <rect x="560" y="200" width="120" height="120" rx="15" fill="#3388ee"/>
    <rect x="570" y="210" width="100" height="100" rx="10" fill="#4499ff"/>
    <text x="620" y="260" font-family="Arial, sans-serif" font-size="40" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>
    <line x1="585" y1="285" x2="655" y2="285" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <line x1="585" y1="305" x2="655" y2="305" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <line x1="585" y1="325" x2="655" y2="325" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>

    <!-- 机器人主体 -->
    <g transform="translate(270, 120)">
        <!-- 天线 -->
        <rect x="130" y="0" width="10" height="35" fill="#333333"/>
        <circle cx="135" cy="10" r="15" fill="#0088ff"/>
        <circle cx="135" cy="10" r="10" fill="#66bbff" opacity="0.7"/>

        <!-- 头部 -->
        <ellipse cx="135" cy="100" rx="110" ry="90" fill="#f8f9fa" stroke="#111111" stroke-width="3"/>
        <ellipse cx="135" cy="100" rx="100" ry="80" fill="#ffffff"/>

        <!-- 耳朵 -->
        <circle cx="30" cy="100" r="25" fill="#e0e0e0" stroke="#111111" stroke-width="2"/>
        <circle cx="30" cy="100" r="15" fill="#0088ff"/>
        <circle cx="240" cy="100" r="25" fill="#e0e0e0" stroke="#111111" stroke-width="2"/>
        <circle cx="240" cy="100" r="15" fill="#0088ff"/>

        <!-- 面部 -->
        <rect x="60" y="60" width="150" height="80" rx="20" fill="#111111"/>

        <!-- 眼睛 -->
        <circle cx="100" cy="95" r="25" fill="#00aaff" opacity="0.3"/>
        <circle cx="100" cy="95" r="20" fill="#ffffff"/>
        <circle cx="100" cy="95" r="12" fill="#111111"/>
        <circle cx="104" cy="90" r="5" fill="#ffffff"/>

        <circle cx="170" cy="95" r="25" fill="#00aaff" opacity="0.3"/>
        <circle cx="170" cy="95" r="20" fill="#ffffff"/>
        <circle cx="170" cy="95" r="12" fill="#111111"/>
        <circle cx="174" cy="90" r="5" fill="#ffffff"/>

        <!-- 微笑嘴巴 -->
        <path d="M 125 115 q 15 10 30 0" stroke="#00aaff" stroke-width="4" fill="none"/>

        <!-- 身体 -->
        <path d="M 70 170 h 130 l 20 120 h -170 z" fill="#ffffff" stroke="#111111" stroke-width="2"/>
        <rect x="100" y="190" width="70" height="45" rx="8" fill="#0066dd"/>
        <text x="135" y="220" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">AI</text>

        <!-- 左臂 -->
        <g transform="translate(70, 175)">
            <rect x="0" y="0" width="35" height="80" rx="15" fill="#ffffff" stroke="#111111" stroke-width="2"/>
            <rect x="0" y="60" width="35" height="12" fill="#0066dd"/>
            <!-- 手和笔 -->
            <circle cx="17" cy="90" r="18" fill="#ffffff" stroke="#111111" stroke-width="2"/>
            <rect x="35" y="50" width="12" height="60" rx="3" fill="#0088ff" transform="rotate(-30, 41, 80)"/>
            <polygon points="41,110 35,125 47,125" fill="#0066dd" transform="rotate(-30, 41, 110)"/>
        </g>

        <!-- 右臂 -->
        <g transform="translate(205, 175)">
            <rect x="0" y="0" width="35" height="80" rx="15" fill="#ffffff" stroke="#111111" stroke-width="2"/>
            <rect x="0" y="30" width="35" height="12" fill="#0066dd"/>
        </g>
    </g>

    <!-- 桌面物品 -->
    <g transform="translate(180, 420)">
        <!-- 书堆 -->
        <rect x="0" y="20" width="120" height="40" rx="5" fill="#0066dd" stroke="#111111" stroke-width="2"/>
        <rect x="10" y="25" width="100" height="30" rx="3" fill="#ffffff"/>
        <rect x="0" y="60" width="120" height="40" rx="5" fill="#00aa99" stroke="#111111" stroke-width="2"/>
        <rect x="10" y="65" width="100" height="30" rx="3" fill="#ffffff"/>

        <!-- 打开的书 -->
        <path d="M 150 40 h 200 v 80 h -200 z" fill="#ffffff" stroke="#111111" stroke-width="3"/>
        <path d="M 150 40 l 100 40 l 100 -40" fill="none" stroke="#0066dd" stroke-width="2"/>
        <line x1="160" y1="55" x2="240" y2="55" stroke="#cccccc" stroke-width="1"/>
        <line x1="160" y1="65" x2="240" y2="65" stroke="#cccccc" stroke-width="1"/>
        <line x1="160" y1="75" x2="240" y2="75" stroke="#cccccc" stroke-width="1"/>
        <line x1="260" y1="55" x2="340" y2="55" stroke="#cccccc" stroke-width="1"/>
        <line x1="260" y1="65" x2="340" y2="65" stroke="#cccccc" stroke-width="1"/>
        <line x1="260" y1="75" x2="340" y2="75" stroke="#cccccc" stroke-width="1"/>
        <path d="M 250 50 l 0 70" stroke="#0066dd" stroke-width="2"/>

        <!-- 笔记本电脑 -->
        <rect x="380" y="20" width="160" height="100" rx="8" fill="#cccccc" stroke="#111111" stroke-width="3"/>
        <rect x="390" y="30" width="140" height="70" fill="#e0e0e0"/>
        <circle cx="460" cy="65" r="15" fill="#888888" opacity="0.5"/>
        <rect x="380" y="110" width="160" height="15" rx="3" fill="#aaaaaa" stroke="#111111" stroke-width="2"/>
    </g>

    <!-- 桌面 -->
    <rect x="120" y="500" width="560" height="10" fill="#111111"/>

    <!-- 文字部分 -->
    <g transform="translate(120, 600)">
        <rect x="0" y="0" width="560" height="150" rx="10" fill="#ffffff" opacity="0.9"/>
        <text x="280" y="100" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="100" font-weight="bold" text-anchor="middle">
            <tspan fill="#0a1a33">小林学</tspan>
            <tspan fill="#0066dd">AI</tspan>
        </text>
    </g>

    <!-- 底部标签栏 -->
    <rect x="180" y="720" width="440" height="60" rx="30" fill="#0066dd"/>
    <text x="400" y="760" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="32" fill="#ffffff" text-anchor="middle">AI 教程 · 学习 · 分享 · 成长</text>

    <!-- 底部装饰 -->
    <line x1="260" y1="800" x2="340" y2="800" stroke="#0066dd" stroke-width="4" stroke-linecap="round"/>
    <circle cx="240" cy="800" r="4" fill="#0066dd"/>
    <line x1="460" y1="800" x2="540" y2="800" stroke="#0066dd" stroke-width="4" stroke-linecap="round"/>
    <circle cx="560" cy="800" r="4" fill="#0066dd"/>
    <!-- 书本图标 -->
    <path d="M 360 785 q 40 15 80 0 v 10 q -40 15 -80 0 z" fill="#0066dd"/>
    <path d="M 360 785 q 40 15 80 0" fill="none" stroke="#ffffff" stroke-width="2"/>
</svg>