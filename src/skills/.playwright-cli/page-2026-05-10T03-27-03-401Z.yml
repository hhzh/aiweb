          - heading "七、总结（新手必看）" [level=2] [ref=e640]
          - paragraph [ref=e641]:
            - text: Claude Code 作为终端原生的AI编程工具，最大的好处就是“能自己干活、还灵活”，新手只要掌握“安装→登录/配置→常用命令”这三步，就能快速上手。重点记住：Windows和Mac均能通过Node.js安装Claude Code，推荐使用官方规范指令
