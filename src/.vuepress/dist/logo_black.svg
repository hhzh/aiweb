<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景圆形边框 -->
    <circle cx="256" cy="256" r="200" fill="none" stroke="#007bff" stroke-width="8"/>

    <!-- 机器人身体部分 -->
    <g transform="translate(100, 100)">
        <!-- 天线 -->
        <rect x="156" y="10" width="8" height="30" fill="#333"/>
        <circle cx="160" cy="15" r="12" fill="#00aaff"/>
        <circle cx="160" cy="15" r="8" fill="#66ccff" opacity="0.7"/>

        <!-- 头部 -->
        <path d="M 60 70
             a 100 100 0 0 1 200 0
             v 80
             h -200
             z" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>

        <!-- 面部区域 -->
        <rect x="70" y="85" width="180" height="70" rx="15" fill="#111"/>

        <!-- 眼睛 -->
        <circle cx="110" cy="110" r="15" fill="#00ccff" opacity="0.3"/>
        <circle cx="110" cy="110" r="12" fill="#fff"/>
        <circle cx="110" cy="110" r="8" fill="#111"/>
        <circle cx="113" cy="107" r="3" fill="#fff"/>

        <circle cx="190" cy="110" r="15" fill="#00ccff" opacity="0.3"/>
        <circle cx="190" cy="110" r="12" fill="#fff"/>
        <circle cx="190" cy="110" r="8" fill="#111"/>
        <circle cx="193" cy="107" r="3" fill="#fff"/>

        <!-- 微笑嘴巴 -->
        <path d="M 145 130
             q 15 10 30 0" stroke="#00ccff" stroke-width="3" fill="none"/>

        <!-- 耳朵 -->
        <circle cx="50" cy="110" r="20" fill="#ddd"/>
        <circle cx="50" cy="110" r="12" fill="#00aaff"/>
        <circle cx="270" cy="110" r="20" fill="#ddd"/>
        <circle cx="270" cy="110" r="12" fill="#00aaff"/>

        <!-- 身体 -->
        <path d="M 80 150
             h 160
             l 20 100
             h -200
             z" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>

        <!-- AI标志 -->
        <rect x="130" y="170" width="60" height="40" rx="5" fill="#007bff"/>
        <text x="160" y="198" font-family="Arial" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">AI</text>

        <!-- 左臂 -->
        <g transform="translate(70, 160)">
            <rect x="0" y="0" width="30" height="80" rx="10" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
            <rect x="0" y="60" width="30" height="10" fill="#333"/>
            <rect x="0" y="70" width="30" height="10" fill="#00aaff"/>
            <!-- 手 -->
            <ellipse cx="15" cy="85" rx="12" ry="10" fill="#333"/>
        </g>

        <!-- 右臂 -->
        <g transform="translate(220, 150) rotate(-30)">
            <rect x="0" y="0" width="30" height="80" rx="10" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
            <rect x="0" y="20" width="30" height="10" fill="#333"/>
            <rect x="0" y="30" width="30" height="10" fill="#00aaff"/>
            <!-- 手 -->
            <g transform="translate(0, 70)">
                <ellipse cx="15" cy="10" rx="12" ry="10" fill="#333"/>
                <rect x="10" y="-15" width="4" height="15" rx="2" fill="#333" transform="rotate(-10, 12, -7)"/>
                <rect x="15" y="-18" width="4" height="18" rx="2" fill="#333"/>
                <rect x="20" y="-15" width="4" height="15" rx="2" fill="#333" transform="rotate(10, 22, -7)"/>
            </g>
        </g>
    </g>
</svg>